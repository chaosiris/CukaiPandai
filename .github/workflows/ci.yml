name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v6
      - name: Install
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Build API image (smoke)
        run: docker build -t cukaipandai-api ./backend
