name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v6
      - name: Install backend deps
        working-directory: backend
        run: uv sync --extra dev
      - name: Run backend tests
        working-directory: backend
        run: uv run pytest -q

      # --- Frontend ---
      - uses: oven-sh/setup-bun@v2
      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: TypeScript check
        working-directory: frontend
        run: bunx tsc --noEmit
      - name: Frontend build
        working-directory: frontend
        run: bun run build
      - name: Biome lint
        run: bunx biome check frontend/src

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image (smoke)
        run: docker build -t cukaipandai-api ./backend

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL not set — skipping backend deploy (Render native auto-deploy still active)"
            exit 0
          fi
          curl -fsS -X POST "$HOOK"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Check Vercel secrets are present
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping frontend deploy (add the 4 Vercel secrets to activate)"
            echo "HAS_VERCEL=0" >> "$GITHUB_ENV"
          else
            echo "HAS_VERCEL=1" >> "$GITHUB_ENV"
          fi
      - name: Install Vercel CLI
        if: env.HAS_VERCEL == '1'
        run: npm i -g vercel@latest
      - name: Pull Vercel env
        if: env.HAS_VERCEL == '1'
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build for Vercel
        if: env.HAS_VERCEL == '1'
        working-directory: frontend
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        if: env.HAS_VERCEL == '1'
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
