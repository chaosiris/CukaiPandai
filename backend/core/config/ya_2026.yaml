# YA2026 tax parameters. Verified 2026-06-19 against LHDN/RMCD + Big-4 summaries.
# Provenance + citations: docs/superpowers/research/2026-06-19-ya2026-figures-verification.md
# (Re-confirm before the final deck — figures can change via Budget/gazette.)
version: 'YA2026.1' # unchanged: income-tax computation values verified identical; only added/annotated config

income_tax:
  # SME (resident company): paid-up ordinary capital <= RM2.5m AT START of basis period
  # AND gross business income <= RM50m, AND shareholding/common-control conditions met. VERIFIED.
  sme_paidup_max: 2500000
  sme_gross_max: 50000000
  sme_bands: # VERIFIED (LHDN tax-rate-of-company; PwC)
    - { upto: 150000, rate: 0.15 } # first RM150,000
    - { upto: 600000, rate: 0.17 } # next RM450,000 (150,001 - 600,000)
    - { upto: null, rate: 0.24 } # remainder
  non_sme_rate: 0.24
  cp204_estimate_days_before: 30 # s.107C: ongoing co. files the CP204 estimate 30 days before the basis period
  # CP204 (s.107C): submit estimate >=30 days before basis period; new company within
  # 3 months of commencement; SME EXEMPT from estimate/instalments for first 2 YAs;
  # monthly instalment by the 15th; revise via CP204A in the 6th and/or 9th month.
  # Form C: file within 7 months after financial year-end.

# VERIFIED (ClearTax/Sovos/VATupdate, Dec-2025) + RE-VERIFIED 2026-06-25 vs LHDN e-Invoice FAQ (5 May 2026).
einvoice_phases:
  - { min_turnover: 100000000, max_turnover: null, mandatory_from: '2024-08-01' }
  - { min_turnover: 25000000, max_turnover: 100000000, mandatory_from: '2025-01-01' }
  - { min_turnover: 5000000, max_turnover: 25000000, mandatory_from: '2025-07-01' }
  - { min_turnover: 1000000, max_turnover: 5000000, mandatory_from: '2026-01-01' }
# Exemption threshold raised to RM1,000,000 from 1 Jan 2026 (Cabinet 6 Dec 2025); the planned final
# phase (sub-RM1m / the old RM150k-RM500k band) was CANCELLED -> sub-RM1m turnover is voluntary.
einvoice_exemption_below: 1000000
# ENFORCEMENT NOTE (added 2026-06-25): the <=RM5m band's 1 Jan 2026 IMPLEMENTATION date stands, but LHDN
# extended the penalty-free interim relaxation twice (PM Anwar 5 Jan 2026; Specific Guideline v4.7, 20 Apr
# 2026) -> penalty-free to 31 Dec 2027, FULL ENFORCEMENT (penalties) from 1 Jan 2028. During the relaxation
# these taxpayers may issue monthly CONSOLIDATED e-invoices with no penalty. Don't tell a sub-RM5m SME it is
# hard-mandated from Jan 2026 without this caveat.
einvoice_smallband_penalty_free_until: '2027-12-31'
einvoice_smallband_enforcement_from: '2028-01-01'

sst: # VERIFIED (RMCD/MOF; ClearTax; Wolters Kluwer)
  registration_threshold: 500000 # general (sales tax + most service tax)
  registration_threshold_special: 1000000 # certain newly-scoped services (e.g. rental/leasing, financial)
  service_tax_rate: 0.08 # most services from 1 Mar 2024 (some 6%); scope expanded 1 Jul 2025
  return: 'SST-02 (bi-monthly)'
  enforcement_from: '2026-01-01' # grace period ended 31 Dec 2025

cgt: # VERIFIED (LHDN CGT Guidelines 2025; EY; KPMG)
  # Disposal of unlisted shares of Malaysian companies by companies/LLPs/trusts,
  # for disposals on/after 1 Mar 2024.
  effective_from: '2024-03-01'
  rate_net_gain: 0.10 # 10% of net chargeable gain
  rate_gross_option: 0.02 # OR 2% of gross disposal price if acquired before 1 Jan 2024

transfer_pricing: # VERIFIED (Malaysia TP Guidelines 2024; Crowe/EY)
  # Full contemporaneous TP documentation required if EITHER:
  full_doc_gross_income_over: 30000000 # gross business income > RM30m AND
  full_doc_crossborder_txn_over: 10000000 # cross-border controlled txns > RM10m
  full_doc_financial_assistance_over: 50000000 # OR controlled financial assistance > RM50m
  # else a "Minimum TP Documentation" suffices.

withholding_tax: # VERIFIED (LHDN; PwC) — domestic non-resident statutory rates
  royalty: 0.10 # ITA s.109; form CP37
  interest: 0.15 # ITA s.109; form CP37
  special_classes_4a: 0.10 # ITA s.109B (technical/management/consultancy fees, movable-property rental); form CP37D
  contract_non_resident: # ITA s.107A; form CP37A
    on_contractor: 0.10
    on_employees: 0.03
  remit_within: '1 month of paying/crediting the non-resident'
  note: 'DTA may reduce rates if the recipient supplies a valid Certificate of Residence (COR)'

# Capital allowances (Schedule 3, ITA 1967). VERIFIED 2026-06-27 vs PwC WWTS + hasilnet + EY/Crowe/Grant Thornton.
# ia/aa = initial/annual allowance fractions; the engine grants a year-1 allowance of (ia+aa) of qualifying
# expenditure (capped where a cost_cap_rm applies). cost_cap_rm: 0 means NO cap (unlimited qualifying cost).
# small_value: 100% in the year of acquisition (PR 3/2021); per-asset <= RM2,000; aggregate RM20,000 cap for
# NON-SMEs only (SMEs are exempt -> unlimited). renovation: the general Renovation & Refurbishment special
# deduction expired 31 Dec 2022 and the only live YA2026 window is MOTAC-tourism-restricted, so the engine
# grants NO automatic renovation allowance (ia/aa = 0). Source URLs in docs (research 2026-06-27).
capital_allowances:
  plant_machinery: { ia: 0.20, aa: 0.14, cost_cap_rm: 0 } # general P&M (PwC; hasilnet)
  motor_vehicle: { ia: 0.20, aa: 0.20, cost_cap_rm: 50000 } # Sch3 para2(2) base cap RM50k; RM100k ONLY if new AND on-road <= RM150k (engine uses the conservative base)
  furniture_office: { ia: 0.20, aa: 0.10, cost_cap_rm: 0 } # 'Others' class (hasilnet)
  ict_software: { ia: 0.40, aa: 0.20, cost_cap_rm: 0 } # ICT ACA Rules 2024 (PwC; EY; Acclime)
  industrial_building: { ia: 0.10, aa: 0.03, cost_cap_rm: 0 } # IBA, ~33yr write-off (Crowe)
  small_value: { rate: 1.00, per_asset_cap_rm: 2000, aggregate_cap_rm: 20000, sme_aggregate_cap_applies: false } # PR 3/2021 (EY)
  renovation: { ia: 0.00, aa: 0.00, cost_cap_rm: 0 } # general R&R deduction EXPIRED 31 Dec 2022; no YA2026 auto-allowance (EY)
  unabsorbed_carryforward_max_years: 10 # Finance Act 2018, eff YA2019 (PwC); same-business + continuity tests. (FLAG: some pre-2019 sources say indefinite)

# Reliefs / caps (further deductions + below-the-line s.44). VERIFIED 2026-06-27 vs LHDN + PwC/EY/Grant Thornton.
# pct values are fractions; *_rm values are ringgit caps. Donation (10%) and zakat (2.5%) caps are measured
# against AGGREGATE INCOME. For a company, zakat is an aggregate-income deduction (s.44(11A)), NOT a rebate.
reliefs:
  epf_remuneration_cap_pct: 0.19 # s.34(4) employer EPF deduction cap (PwC)
  secretarial_taxfiling_cap_rm: 15000 # combined secretarial + tax-filing cap/YA (P.U.(A) 162/2020, as amended by P.U.(A) 471/2021; in force YA2026) (EY)
  esg_further_deduction_cap_rm: 50000 # ESG further deduction/YA, YA2024-YA2027 (P.U.(A)193/2025) (Grant Thornton)
  rd_double_deduction_pct: 2.00 # s.34A/34B qualifying R&D double deduction (overseas R&D capped 30% of total) (LHDN PR10/2021)
  donation_aggregate_income_cap_pct: 0.10 # s.44(6) approved cash donations, max 10% of aggregate income (LHDN)
  zakat_aggregate_income_cap_pct: 0.025 # s.44(11A) business zakat, max 2.5% of aggregate income (PwC)
  group_relief_max_pct: 0.70 # s.44A: up to 70% of the SURRENDERING company's current-year loss; BOTH companies need paid-up > RM2.5m (i.e. NOT SMEs) (LHDN PR2/2025)
  loss_carryforward_max_years: 10 # s.44(5F) unabsorbed business loss, max 10 consecutive YAs (eff YA2019) (PwC)
